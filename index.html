<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Dashboard</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* LOGIN */
.login {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background: rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  width:300px;
  backdrop-filter: blur(15px);
}

input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button {
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.03);
}

/* DASHBOARD */
.app {
  display:none;
  padding:20px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding:15px;
  border-radius:12px;
  margin-top:10px;
  backdrop-filter: blur(15px);
  transition:0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.row {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.small {
  width:auto;
  padding:6px 10px;
  font-size:12px;
}

.red { background:#ef4444; }
.green { background:#22c55e; }

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginBox">
  <div class="box">
    <h2>🔐 Login</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">

<h2>📊 Personal Dashboard</h2>

<div class="box" style="margin-bottom:15px">
  <input id="title" placeholder="Title">
  <input id="desc" placeholder="Description">
  <button onclick="add()">Add</button>
</div>

<div id="list"></div>

</div>

<script>

/* DEFAULT PASSWORD */
const PASSWORD = "258456";

/* LOGIN */
function login() {
  const input = document.getElementById("pass").value;

  if(input === PASSWORD) {
    loginBox.style.display = "none";
    app.style.display = "block";
    load();
  } else {
    alert("Wrong password");
  }
}

/* DATA STORAGE */
let data = JSON.parse(localStorage.getItem("data") || "[]");

/* LOAD */
function load() {
  document.getElementById("list").innerHTML =
    data.map((i, index) => `
      <div class="card">
        <b>${i.title}</b><br>
        ${i.desc}<br>

        <button class="small green" onclick="edit(${index})">Edit</button>
        <button class="small red" onclick="del(${index})">Delete</button>
      </div>
    `).join("");
}

/* ADD */
function add() {
  data.push({
    title: title.value,
    desc: desc.value
  });

  save();
  load();

  title.value = "";
  desc.value = "";
}

/* DELETE */
function del(i) {
  data.splice(i,1);
  save();
  load();
}

/* EDIT */
function edit(i) {
  let t = prompt("Edit title", data[i].title);
  let d = prompt("Edit desc", data[i].desc);

  data[i].title = t;
  data[i].desc = d;

  save();
  load();
}

/* SAVE */
function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

/* INIT */
load();

</script>

</body>
</html>
